name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Derive version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish (framework-dependent, win-x64)
        run: >
          dotnet publish src\MultiClod.App\MultiClod.App.csproj
          -c Release -r win-x64 --self-contained false
          -p:Version=${{ steps.version.outputs.version }}
          -o publish\MultiClod.App

      - name: Install vpk
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Download previous release (for delta packages)
        run: vpk download github --repoUrl https://github.com/sirphilliptubell/multi-clod
        continue-on-error: true # fails harmlessly on the very first release, when none exist yet

      - name: Pack
        run: >
          vpk pack --packId MultiClod.App --packTitle "Multi-Clod"
          --packVersion ${{ steps.version.outputs.version }}
          --packDir publish\MultiClod.App --mainExe MultiClod.App.exe
          --icon src\MultiClod.App\Assets\app.ico
          --framework net8-x64-desktop --outputDir publish\MultiClod.App.Release

      - name: Upload release
        run: >
          vpk upload github --repoUrl https://github.com/sirphilliptubell/multi-clod
          --token ${{ secrets.GITHUB_TOKEN }} --publish
          --releaseName "Multi-Clod ${{ steps.version.outputs.version }}"
          --tag ${{ github.ref_name }}
